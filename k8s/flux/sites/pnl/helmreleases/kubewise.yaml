---
# KubeWise — Kubernetes cost & performance advisor
# Chart version bumped automatically by jamilshaikh07/kubewise CI on every push to main.
# Images: ghcr.io/jamilshaikh07/kubewise-{api,dashboard,agent}
#
# NOTE: GHCR packages must be set to PUBLIC so the cluster can pull them without a secret.
# Visit: https://github.com/jamilshaikh07?tab=packages
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubewise-charts
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/jamilshaikh07/charts
  type: oci
  secretRef:
    name: ghcr-kubewise
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubewise
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: kubewise
  chart:
    spec:
      chart: kubewise
      version: "0.1.0"  # bumped automatically by CI — do not edit
      sourceRef:
        kind: HelmRepository
        name: kubewise-charts
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
  values:
    agent:
      enabled: true
      clusterName: talos-homelab
      pollIntervalSeconds: 300
    api:
      persistence:
        storageClass: local-path
      env:
        SEED_DEMO_DATA: "false"
        DEFAULT_NODE_HOURLY_RATE: "0.096"
    global:
      imagePullSecrets:
        - name: ghcr-kubewise
    ingress:
      enabled: false
