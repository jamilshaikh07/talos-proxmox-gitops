---
# Grafana IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    # external-dns: create grafana.jamilshaikh.in CNAME → cloudflare tunnel
    external-dns.alpha.kubernetes.io/target: "3a067db9-77b1-49c9-a3d4-30f86d16c80d.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.jamilshaikh.in`)
      kind: Rule
      services:
        - name: victoria-metrics-grafana
          port: 80
