apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mattermost
  namespace: mattermost
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`mattermost.lab.jamilshaikh.in`)
      kind: Rule
      middlewares:
        - name: https-redirect
      services:
        - name: mattermost
          port: 8065
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: mattermost
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mattermost-tls
  namespace: mattermost
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mattermost.lab.jamilshaikh.in`)
      kind: Rule
      services:
        - name: mattermost
          port: 8065
  tls:
    secretName: mattermost-lab-tls
