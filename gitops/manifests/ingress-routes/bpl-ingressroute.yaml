---
# Belapur Premier League (BPL) IngressRoute
# Same Cloudflare-tunnel pattern as argocd / grafana / uptime.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bpl
  namespace: bpl
  annotations:
    # external-dns: create bpl.jamilshaikh.in CNAME → cloudflare tunnel
    external-dns.alpha.kubernetes.io/target: "3a067db9-77b1-49c9-a3d4-30f86d16c80d.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    # API + websocket -> backend
    - kind: Rule
      match: Host(`bpl.jamilshaikh.in`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`))
      services:
        - name: bpl-backend
          port: 4000
    # Everything else -> SPA
    - kind: Rule
      match: Host(`bpl.jamilshaikh.in`)
      services:
        - name: bpl-frontend
          port: 80
