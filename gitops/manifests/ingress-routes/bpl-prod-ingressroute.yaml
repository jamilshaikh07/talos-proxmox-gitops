---
# BPL prod IngressRoute — belapurpremierleague.com
#
# Routes the apex (and www.) through Traefik to the bpl-prod namespace
# services. external-dns picks up the Host() matchers and creates the
# Cloudflare CNAMEs pointing at the existing tunnel.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bpl-prod
  namespace: bpl-prod
  annotations:
    # external-dns: create belapurpremierleague.com + www CNAME → tunnel
    external-dns.alpha.kubernetes.io/target: "3a067db9-77b1-49c9-a3d4-30f86d16c80d.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    # API + websocket -> backend.  Explicit `priority` ensures these
    # rules win over the SPA catch-all below regardless of how Traefik
    # weighs match-string length.  Apex + www each get their own rule —
    # mirrors the stage IngressRoute's working single-line shape.
    - kind: Rule
      match: Host(`belapurpremierleague.com`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`))
      priority: 100
      services:
        - name: bpl-backend
          port: 4000
    - kind: Rule
      match: Host(`www.belapurpremierleague.com`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`))
      priority: 100
      services:
        - name: bpl-backend
          port: 4000
    # Everything else -> SPA
    - kind: Rule
      match: Host(`belapurpremierleague.com`)
      services:
        - name: bpl-frontend
          port: 80
    - kind: Rule
      match: Host(`www.belapurpremierleague.com`)
      services:
        - name: bpl-frontend
          port: 80
