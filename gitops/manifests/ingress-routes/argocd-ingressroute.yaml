---
# ArgoCD Server IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    # external-dns: create argocd.jamilshaikh.in CNAME → cloudflare tunnel
    external-dns.alpha.kubernetes.io/target: "3a067db9-77b1-49c9-a3d4-30f86d16c80d.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.jamilshaikh.in`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
