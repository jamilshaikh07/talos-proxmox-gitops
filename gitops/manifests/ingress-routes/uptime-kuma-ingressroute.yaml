---
# Uptime Kuma IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: monitoring
  annotations:
    # external-dns: create uptime.jamilshaikh.in CNAME → cloudflare tunnel
    external-dns.alpha.kubernetes.io/target: "ac018f25-b07f-4b4b-8c83-1f27b0f9a418.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`uptime.jamilshaikh.in`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
