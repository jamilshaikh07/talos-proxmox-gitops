---
# Uptime Kuma IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: monitoring
  annotations:
    # external-dns: create uptime.jamilshaikh.in CNAME → cloudflare tunnel
    external-dns.alpha.kubernetes.io/target: "3a067db9-77b1-49c9-a3d4-30f86d16c80d.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`uptime.jamilshaikh.in`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
