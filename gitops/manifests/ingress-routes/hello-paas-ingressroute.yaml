---
# Smoke test for the flat <id>.jamilshaikh.in subdomain pattern
# that the self-hosted PaaS (vercel-clone) will use for tenant deployments.
# Reachable at: https://hello-paas.jamilshaikh.in
apiVersion: v1
kind: Namespace
metadata:
  name: paas-deployments
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: paas-deployments
  labels:
    app: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: paas-deployments
spec:
  selector:
    app: hello
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello
  namespace: paas-deployments
  annotations:
    # external-dns picks this up from --source=traefik-proxy and creates
    # a proxied CNAME hello-paas.jamilshaikh.in → tunnel hostname
    external-dns.alpha.kubernetes.io/target: "3a067db9-77b1-49c9-a3d4-30f86d16c80d.cfargotunnel.com"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`hello-paas.jamilshaikh.in`)
      kind: Rule
      services:
        - name: hello
          port: 80
