apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: oee-test-cluster
  namespace: test-pg
spec:
  instances: 1

  # PostgreSQL 17.5 image
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5

  # Storage configuration
  storage:
    storageClass: local-path
    size: 5Gi

  walStorage:
    storageClass: local-path
    size: 1Gi

  # Bootstrap: fresh empty cluster
  bootstrap:
    initdb:
      database: oee_test
      owner: app
      secret:
        name: app-credentials

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "2621kB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"

  # Monitoring
  monitoring:
    enablePodMonitor: false

  # Backup configuration pointing to MinIO
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/oee-test-cluster
      endpointURL: http://minio.minio-system.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: minio-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: minio-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2
    retentionPolicy: "7d"

  # Resources
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: test-pg
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: testpassword123
