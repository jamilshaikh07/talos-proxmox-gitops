---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-readonly
rules:
  # Read everything
  - apiGroups: [""]
    resources: [nodes, pods, events, namespaces, services, endpoints, persistentvolumes, persistentvolumeclaims]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, daemonsets, statefulsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [get, list, watch]
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list]
  # Auto-remediation (Option B): delete pods to force restart/reschedule
  # Safe — pods are ephemeral; deleting a Pending/CrashLoop pod just reschedules it
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]
  # Approval-gated remediation (Option A): patch workloads on user confirm
  # Covers: kubectl rollout restart (patches deployment), kubectl scale
  - apiGroups: [apps]
    resources: [deployments, daemonsets, statefulsets]
    verbs: [patch, update]
  # Approval-gated: ArgoCD app sync on user confirm
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [patch, update]
  # Phase 3: persist auto-fix counters using namespace annotations
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [patch]
  # Phase 3 runbook: cordon/uncordon require node patch
  - apiGroups: [""]
    resources: [nodes]
    verbs: [patch]
  # Phase 3 runbook: drain uses eviction subresource
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-readonly
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: openclaw
