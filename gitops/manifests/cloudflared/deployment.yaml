---
# ConfigMap: cloudflared ingress rules (GitOps-managed, no Cloudflare dashboard needed)
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: ac018f25-b07f-4b4b-8c83-1f27b0f9a418
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    protocol: http2
    # Global origin settings — applied to all ingress rules including those
    # pushed remotely from the Cloudflare dashboard.
    # noTLSVerify: needed because the Cloudflare dashboard-managed route may
    # connect via https; cert is Traefik's internal self-signed cert.
    originRequest:
      noTLSVerify: true
    ingress:
      # Wildcard: all *.jamilshaikh.in → Traefik (Cloudflare handles public TLS)
      - hostname: "*.jamilshaikh.in"
        service: http://traefik.traefik-system.svc.cluster.local
        originRequest:
          noTLSVerify: true
      # Required catch-all
      - service: http_status:404
---
# Cloudflared Tunnel Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.2.1
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          ports:
            - containerPort: 2000
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-credentials
      restartPolicy: Always
