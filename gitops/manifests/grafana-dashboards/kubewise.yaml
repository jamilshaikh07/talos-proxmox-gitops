apiVersion: v1
kind: ConfigMap
metadata:
  name: kubewise
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "homelab"
data:
  kubewise.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "KubeWise — Kubernetes resource efficiency: CPU/Memory usage vs requests, waste by namespace and top over-provisioned workloads.",
      "editable": true,
      "gnetId": null,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace!~\"kube-system|kube-public|kube-node-lease\",container!=\"\",container!=\"POD\"}[5m])) / sum(kube_pod_container_resource_requests{resource=\"cpu\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) * 100",
              "instant": true,
              "legendFormat": "CPU Utilization",
              "refId": "A"
            }
          ],
          "title": "CPU Utilization",
          "type": "stat"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "sum(container_memory_working_set_bytes{namespace!~\"kube-system|kube-public|kube-node-lease\",container!=\"\",container!=\"POD\"}) / sum(kube_pod_container_resource_requests{resource=\"memory\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) * 100",
              "instant": true,
              "legendFormat": "Memory Utilization",
              "refId": "A"
            }
          ],
          "title": "Memory Utilization",
          "type": "stat"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "orange", "value": 500 },
                  { "color": "red", "value": 2000 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "text": {},
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "(sum(kube_pod_container_resource_requests{resource=\"cpu\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) - sum(rate(container_cpu_usage_seconds_total{namespace!~\"kube-system|kube-public|kube-node-lease\",container!=\"\",container!=\"POD\"}[5m]))) * 1000",
              "instant": true,
              "legendFormat": "CPU Waste (m)",
              "refId": "A"
            }
          ],
          "title": "CPU Wasted",
          "type": "stat"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "orange", "value": 512 },
                  { "color": "red", "value": 2048 }
                ]
              },
              "unit": "mebibytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "text": {},
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "(sum(kube_pod_container_resource_requests{resource=\"memory\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) - sum(container_memory_working_set_bytes{namespace!~\"kube-system|kube-public|kube-node-lease\",container!=\"\",container!=\"POD\"})) / 1024 / 1024",
              "instant": true,
              "legendFormat": "Memory Waste",
              "refId": "A"
            }
          ],
          "title": "Memory Wasted",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 6,
          "title": "CPU Efficiency",
          "type": "row"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "millicores",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineStyle": { "fill": "solid" },
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "B" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } },
                  { "id": "custom.lineWidth", "value": 1 }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace!~\"kube-system|kube-public|kube-node-lease\",container!=\"\",container!=\"POD\"}[5m])) by (namespace) * 1000",
              "legendFormat": "usage: {{namespace}}",
              "refId": "A"
            },
            {
              "datasource": "$Datasource",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) by (namespace) * 1000",
              "legendFormat": "requested: {{namespace}}",
              "refId": "B"
            }
          ],
          "title": "CPU Usage vs Requested by Namespace (solid=usage, dashed=requested)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 8,
          "title": "Memory Efficiency",
          "type": "row"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "MiB",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineStyle": { "fill": "solid" },
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "mebibytes"
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "B" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } },
                  { "id": "custom.lineWidth", "value": 1 }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "id": 9,
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "sum(container_memory_working_set_bytes{namespace!~\"kube-system|kube-public|kube-node-lease\",container!=\"\",container!=\"POD\"}) by (namespace) / 1024 / 1024",
              "legendFormat": "usage: {{namespace}}",
              "refId": "A"
            },
            {
              "datasource": "$Datasource",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) by (namespace) / 1024 / 1024",
              "legendFormat": "requested: {{namespace}}",
              "refId": "B"
            }
          ],
          "title": "Memory Usage vs Requested by Namespace (solid=usage, dashed=requested)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 10,
          "title": "Namespace Snapshot — Current",
          "type": "row"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-BlPu" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 11,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "sort_desc(sum by (namespace) (kube_pod_container_resource_requests{resource=\"cpu\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) * 1000)",
              "instant": true,
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "title": "CPU Requested by Namespace (millicores)",
          "type": "bargauge"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-BlPu" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "mebibytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 12,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "sort_desc(sum by (namespace) (kube_pod_container_resource_requests{resource=\"memory\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) / 1024 / 1024)",
              "instant": true,
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "title": "Memory Requested by Namespace (MiB)",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 13,
          "title": "Top Over-Provisioned Workloads",
          "type": "row"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "color-background" },
                "filterable": true,
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 500 }
                ]
              },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "namespace" },
                "properties": [{ "id": "custom.width", "value": 140 }]
              },
              {
                "matcher": { "id": "byName", "options": "pod" },
                "properties": [{ "id": "custom.width", "value": 280 }]
              }
            ]
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 33 },
          "id": 14,
          "options": {
            "cellHeight": "sm",
            "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Value" }]
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "topk(15, sum by (namespace, pod) (kube_pod_container_resource_requests{resource=\"cpu\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) * 1000)",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "A"
            }
          ],
          "title": "Top CPU Requested Workloads (millicores)",
          "type": "table"
        },
        {
          "datasource": "$Datasource",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "color-background" },
                "filterable": true,
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 128 },
                  { "color": "red", "value": 512 }
                ]
              },
              "unit": "mebibytes"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "namespace" },
                "properties": [{ "id": "custom.width", "value": 140 }]
              },
              {
                "matcher": { "id": "byName", "options": "pod" },
                "properties": [{ "id": "custom.width", "value": 280 }]
              }
            ]
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 33 },
          "id": 15,
          "options": {
            "cellHeight": "sm",
            "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Value" }]
          },
          "targets": [
            {
              "datasource": "$Datasource",
              "expr": "topk(15, sum by (namespace, pod) (kube_pod_container_resource_requests{resource=\"memory\",namespace!~\"kube-system|kube-public|kube-node-lease\"}) / 1024 / 1024)",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "A"
            }
          ],
          "title": "Top Memory Requested Workloads (MiB)",
          "type": "table"
        }
      ],
      "refresh": "5m",
      "schemaVersion": 38,
      "tags": ["kubewise", "resources", "efficiency"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "Datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "KubeWise — Resource Efficiency",
      "uid": "kubewise-resource-efficiency",
      "version": 1
    }
