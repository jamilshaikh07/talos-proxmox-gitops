---
# Root Kustomization — Flux's equivalent of ArgoCD's app-of-apps
# Points at gitops/flux/apps/ and reconciles everything inside it
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: homelab
  path: ./gitops/flux/apps
  prune: true
  wait: true
  timeout: 5m
