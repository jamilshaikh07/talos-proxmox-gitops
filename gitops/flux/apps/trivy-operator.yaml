---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: aquasecurity
  namespace: flux-system
spec:
  interval: 24h
  url: https://aquasecurity.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  interval: 1h
  chart:
    spec:
      chart: trivy-operator
      version: ">=0.24.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: aquasecurity
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # --- Scan all namespaces
    targetNamespaces: ""   # empty = all namespaces

    # --- Lightweight resource profile
    operator:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi

    trivy:
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          memory: 500Mi
      # Offline DB — pull from ghcr, no internet hit per scan
      dbRegistry: "ghcr.io"
      dbRepository: "aquasecurity/trivy-db"
      javaDbRegistry: "ghcr.io"
      javaDbRepository: "aquasecurity/trivy-java-db"

    # --- Enable DefectDojo integration
    # Findings are exported as VulnerabilityReport CRDs in-cluster
    # Prometheus scrapes them via the built-in metrics endpoint
    serviceMonitor:
      enabled: true    # Prometheus scrapes trivy-operator metrics

    # --- Scan policies: only flag Critical/High to keep noise low
    vulnerabilityReports:
      enabled: true
    configAuditReports:
      enabled: true
    exposedSecretReports:
      enabled: true
    rbacAssessmentReports:
      enabled: false   # enable later when hardening RBAC
