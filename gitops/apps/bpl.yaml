apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bpl
  namespace: argocd
  annotations:
    # Apply after core infra (traefik, cnpg, cloudflared, ingress-routes).
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: bpl
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/jamilshaikh07/cfl-season2
    path: k8s
    targetRevision: main
    # Cluster ingress is owned by this repo (gitops/manifests/ingress-routes/),
    # mirroring argocd/grafana/uptime. The app repo only ships namespace, DB,
    # backend, frontend, and migrate Job manifests.
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
