apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  destination:
    namespace: external-dns
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns
    targetRevision: 1.20.0
    helm:
      values: |
        # External-DNS - Auto-manage DNS records in Cloudflare

        provider:
          name: cloudflare

        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api-token

        # Domain filter - only manage these domains
        domainFilters:
          - jamilshaikh.in
          - belapurpremierleague.com
          - spinup.in

        # Sources to watch for DNS records
        # traefik-proxy: reads Host() matchers from IngressRoute CRDs (traefik.io/v1alpha1)
        # --traefik-disable-legacy flag was removed in external-dns v0.15+ (now default behaviour)
        sources:
          - traefik-proxy

        # Cloudflare: proxy records through Cloudflare edge (required for cfargotunnel.com CNAMEs)
        extraArgs:
          - --cloudflare-proxied

        # Policy: sync will create, update, and delete records
        policy: sync

        # Reconciliation interval — how often external-dns scans
        # IngressRoutes for changes and pushes diffs to Cloudflare.
        # Default is 1m, which means brand-new tenant URLs can sit at
        # NXDOMAIN for up to ~60s after Spinup creates the IngressRoute
        # — long enough that users click their freshly-deployed URL,
        # hit NXDOMAIN, the negative answer gets cached by their
        # resolver, and the page stays "broken" in their browser
        # minutes after the record actually exists. Drop to 15s so
        # newly-created records appear in Cloudflare within a single
        # human-perceivable beat. Cloudflare's API quota is generous
        # (1200 req/5 min/account) and we only push when the diff is
        # non-empty, so 4x more polling costs us ~nothing.
        interval: 15s

        # Registry to track ownership of DNS records
        registry: txt
        txtOwnerId: homelab-cluster
        txtPrefix: external-dns-

        # Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        # Logging
        logLevel: info
        logFormat: text
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
