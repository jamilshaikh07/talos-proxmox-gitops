apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # bpl-prod = belapurpremierleague.com (namespace `bpl-prod`).
  # Tracks main HEAD via the prod Kustomize overlay, which pins image tags
  # to released versions (NEVER `:latest`).
  name: bpl-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: bpl-prod
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/jamilshaikh07/cfl-season2
    path: k8s/overlays/prod
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
