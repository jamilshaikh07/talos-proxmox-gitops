apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-k8s-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: k8s-gateway
    repoURL: https://ori-edge.github.io/k8s_gateway/
    targetRevision: 2.4.0
    helm:
      values: |
        # CoreDNS - Internal wildcard DNS for *.lab.jamilshaikh.in → Traefik VIP
        # Uses template plugin: all *.lab.jamilshaikh.in → 192.168.60.81 (Traefik LoadBalancer)
        # k8s_gateway plugin removed - it can't watch Traefik IngressRoute CRDs

        # Domain configuration (used for apex record)
        domain: lab.jamilshaikh.in

        # Disable k8s_gateway resource watching (replaced by template plugin below)
        watchedResources: []

        # Service configuration - MetalLB LoadBalancer
        service:
          type: LoadBalancer
          port: 53
          annotations:
            metallb.universe.tf/loadBalancerIPs: 192.168.60.82

        # Add template plugin as wildcard catch-all BEFORE the standard zone plugins
        extraZonePlugins:
          - name: template
            parameters: IN A lab.jamilshaikh.in
            configBlock: |-
              answer "{{ .Name }} 300 IN A 192.168.60.81"
          - name: log
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: forward
            parameters: . /etc/resolv.conf
          - name: loop
          - name: reload
          - name: loadbalance

        # Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Monitoring
        serviceMonitor:
          enabled: true
          namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # kube-system already exists
      - ServerSideApply=true
