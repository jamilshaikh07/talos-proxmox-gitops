apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mattermost
  namespace: argocd
  labels:
    argocd.argoproj.io/instance: app-of-apps
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    chart: mattermost
    repoURL: https://helm.mattermost.com
    targetRevision: 2.8.0
    helm:
      values: |
        global:
          siteUrl: "https://mattermost.jamilshaikh.in"
          # database and fileStore intentionally NOT set under
          # global.features — that chart path derives
          # MM_SQLSETTINGS_DRIVERNAME from the DSN scheme (crash-loops:
          # unknown driver "postgresql") and unconditionally forces
          # MM_FILESETTINGS_AMAZONS3SSL=true with no override (breaks
          # against MinIO's plain-HTTP internal endpoint). Both are
          # wired directly via mattermostApp.extraEnv below instead,
          # which gives exact control over the actual env vars.

        mattermostApp:
          replicaCount: 1
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          service:
            type: ClusterIP
          extraEnv:
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MM_SQLSETTINGS_DATASOURCE
              valueFrom:
                secretKeyRef:
                  name: mattermost-db-app
                  key: uri
            - name: MM_FILESETTINGS_DRIVERNAME
              value: amazons3
            - name: MM_FILESETTINGS_AMAZONS3ENDPOINT
              value: minio.minio-system.svc.cluster.local:9000
            - name: MM_FILESETTINGS_AMAZONS3SSL
              value: "false"
            - name: MM_FILESETTINGS_AMAZONS3BUCKET
              value: mattermost
            - name: MM_FILESETTINGS_AMAZONS3REGION
              value: us-east-1
            - name: MM_FILESETTINGS_AMAZONS3ACCESSKEYID
              valueFrom:
                secretKeyRef:
                  name: mattermost-s3-creds
                  key: accessKeyId
            - name: MM_FILESETTINGS_AMAZONS3SECRETACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: mattermost-s3-creds
                  key: secretAccessKey

        serviceAccount:
          create: false
  destination:
    server: https://kubernetes.default.svc
    namespace: mattermost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
