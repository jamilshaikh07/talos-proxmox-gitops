apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mattermost
  namespace: argocd
  labels:
    argocd.argoproj.io/instance: app-of-apps
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    chart: mattermost
    repoURL: https://helm.mattermost.com
    targetRevision: 2.8.0
    helm:
      values: |
        global:
          siteUrl: "https://mattermost.jamilshaikh.in"
          # database intentionally NOT set under global.features — that
          # chart path derives MM_SQLSETTINGS_DRIVERNAME from the DSN
          # scheme (crash-loops: unknown driver "postgresql"). Wired via
          # mattermostApp.extraEnv below instead.
          #
          # fileStore.driver/bucket ARE set here (chart renders these two
          # unconditionally regardless of config, so they must be set
          # here rather than duplicated in extraEnv — ArgoCD's
          # ServerSideApply rejects duplicate env-list entries outright).
          # endpoint/ssl/region/credentials go via extraEnv instead,
          # since setting existingSecret/url here also unconditionally
          # forces MM_FILESETTINGS_AMAZONS3SSL=true with no override,
          # which fails against MinIO's plain-HTTP internal endpoint.
          features:
            fileStore:
              driver: "amazons3"
              bucket: "mattermost"
              existingSecret:
                name: mattermost-s3-creds
                accessKeyIdKey: accessKeyId
                secretAccessKeyKey: secretAccessKey

        mattermostApp:
          replicaCount: 1
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          service:
            type: ClusterIP
          extraEnv:
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MM_SQLSETTINGS_DATASOURCE
              valueFrom:
                secretKeyRef:
                  name: mattermost-db-app
                  key: uri
            - name: MM_FILESETTINGS_AMAZONS3ENDPOINT
              value: minio.minio-system.svc.cluster.local:9000
            - name: MM_FILESETTINGS_AMAZONS3SSL
              value: "false"
            - name: MM_FILESETTINGS_AMAZONS3REGION
              value: us-east-1

        serviceAccount:
          create: false
  destination:
    server: https://kubernetes.default.svc
    namespace: mattermost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
