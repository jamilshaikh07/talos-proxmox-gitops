apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  destination:
    namespace: trivy-system
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: trivy-operator
    repoURL: https://aquasecurity.github.io/helm-charts
    targetRevision: 0.32.1
    helm:
      values: |
        # Scan all namespaces
        targetNamespaces: ""

        operator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          # infraAssessment (node-collector) targets a traditional systemd
          # host layout (/etc/systemd, /var/lib/kubelet, etc.) that doesn't
          # exist on Talos's immutable, systemd-less nodes — the job can
          # never succeed there, just retries forever. Everything else
          # (vuln/config-audit/secret scanning) is unaffected.
          infraAssessmentScannerEnabled: false

        trivy:
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              memory: 500Mi
          dbRegistry: "ghcr.io"
          dbRepository: "aquasecurity/trivy-db"

        # VulnerabilityReports scraped by Victoria Metrics via serviceMonitor
        serviceMonitor:
          enabled: true

        vulnerabilityReports:
          enabled: true
        configAuditReports:
          enabled: true
        exposedSecretReports:
          enabled: true
        rbacAssessmentReports:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
