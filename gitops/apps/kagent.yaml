apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
  labels:
    argocd.argoproj.io/instance: app-of-apps
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/kagent-dev/kagent/helm/kagent
    targetRevision: 0.9.11
    helm:
      values: |
        ui:
          service:
            type: ClusterIP
          externalUrl: "https://kagent.jamilshaikh.in"

        # DeepSeek via the OpenAI-compatible endpoint — same key/pattern as
        # openclaw. Secret created imperatively (see README-secrets.md),
        # never committed to git.
        providers:
          default: openAI
          openAI:
            provider: OpenAI
            model: "deepseek-chat"
            apiKeySecretRef: kagent-tokens
            apiKeySecretKey: DEEPSEEK_API_KEY
            config:
              baseUrl: "https://api.deepseek.com"

        # Trimmed to stacks actually running on this cluster — no Istio,
        # no kgateway, no Argo Rollouts (plain ArgoCD only).
        istio-agent:
          enabled: false
        kgateway-agent:
          enabled: false
        argo-rollouts-agent:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
